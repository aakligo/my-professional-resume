name: My first pipeline

on:
    push:
        branches: [ main ]
     
  jobs:
     build:
         runs-on: ubuntu-latest
         steps:
            - name: clone the code
              uses: actions/checkout@v2
            - name: build image
              run: docker build -t aakligo/cicd-portfolio .
            - name: docker login
              uses: docker/login-action@v1
              with:
                username: aakligo
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: push image
              run: 
                docker push aakligo/cicd-portfolio

        
            

         
    

    

    



  
